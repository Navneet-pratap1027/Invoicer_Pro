version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: invoicerpro-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - invoicerpro-network

  # ── Server ──────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: invoicerpro-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - DB_URL=mongodb://mongo:27017/invoicerpro
      - SECRET=${SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - PORT=5000
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    depends_on:
      - mongo
    networks:
      - invoicerpro-network
    volumes:
      - ./server:/app
      - /app/node_modules

  # ── Client ──────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: invoicerpro-client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server
    networks:
      - invoicerpro-network

volumes:
  mongo_data:

networks:
  invoicerpro-network:
    driver: bridge