# render.yaml — Auto-deploy config for Render.com
services:
  # ── Backend API ─────────────────────────────────────────
  - type: web
    name: invoicerpro-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    healthCheckPath: /
    envVars:
      - key: DB_URL
        sync: false          # Set manually in Render dashboard
      - key: SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: PORT
        value: 5000
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: NODE_ENV
        value: production

  # ── Frontend ─────────────────────────────────────────────
  - type: web
    name: invoicerpro-client
    runtime: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    plan: free
    buildArgs:
      - key: REACT_APP_API
        sync: false          # Set manually in Render dashboard
      - key: REACT_APP_URL
        sync: false
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false